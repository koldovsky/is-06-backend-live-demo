name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy-preview:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: team_xYpUvnYHmiO2Qh7rgrlagIff
      VERCEL_PROJECT_ID: prj_lg2xJN3vsoeRB2DLHoTquPHy282A
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - run: npx vercel@latest pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - run: npx vercel@latest build --token=${{ secrets.VERCEL_TOKEN }}

      - id: deploy
        run: echo "url=$(npx vercel@latest deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"

  deploy-production:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: team_xYpUvnYHmiO2Qh7rgrlagIff
      VERCEL_PROJECT_ID: prj_lg2xJN3vsoeRB2DLHoTquPHy282A
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - id: deploy
        run: echo "url=$(npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"
